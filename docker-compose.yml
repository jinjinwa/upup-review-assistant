name: upup-open-source

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-upup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upup_demo_password}
      POSTGRES_DB: ${POSTGRES_DB:-upup_community}
    volumes:
      - upup_open_source_postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upup} -d ${POSTGRES_DB:-upup_community}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://upup:upup_demo_password@db:5432/upup_community}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-community-demo-secret-32-bytes-minimum}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      DEMO_ADMIN_EMAIL: admin@example.com
      DEMO_ADMIN_PASSWORD: admin123456
      DEMO_USER_EMAIL: demo@example.com
      DEMO_USER_PASSWORD: demo123456
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18000:8000"

  celery-worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://upup:upup_demo_password@db:5432/upup_community}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-community-demo-secret-32-bytes-minimum}
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "18080:80"

volumes:
  upup_open_source_postgres_data:
